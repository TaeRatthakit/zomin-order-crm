<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="application-name" content="Zomin CRM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Zomin CRM">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Zomin Order CRM V3</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="เมนูหลัก">
        <div class="brand">
          <div class="brand-mark">Z</div>
          <div>
            <strong>Zomin CRM</strong>
            <span>Order Workflow V3</span>
          </div>
        </div>
        <nav id="mainNav" class="nav-list"></nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Zomin Order CRM</p>
            <h1 id="pageTitle">Dashboard</h1>
            <div id="subpageNav" class="subpage-nav" hidden></div>
          </div>
          <div class="top-actions">
            <div id="userPill" class="user-pill" hidden></div>
            <label class="date-picker">
              <span>วันที่ทำงาน</span>
              <input id="workDate" type="date">
            </label>
          </div>
        </header>

        <section id="toast" class="toast" hidden></section>
        <section id="content" class="content-area"></section>
      </main>
    </div>

    <dialog id="customerDialog" class="dialog wide-dialog">
      <form method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Customer Profile</p>
            <h2 id="dialogCustomerName">ลูกค้า</h2>
          </div>
          <button class="icon-button" type="button" data-close-customer aria-label="ปิด">×</button>
        </div>
        <div id="customerDetail"></div>
      </form>
    </dialog>

    <dialog id="orderDialog" class="dialog">
      <form id="orderForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Order</p>
            <h2 id="orderDialogTitle">เพิ่มออเดอร์</h2>
          </div>
          <button class="icon-button" type="button" data-close-order aria-label="ปิด">×</button>
        </div>
        <div class="form-grid">
          <label>ชื่อลูกค้า<input name="name" required placeholder="เช่น คุณสมใจ"></label>
          <label>เบอร์โทร<input name="phone" required placeholder="0812345678"></label>
          <label>เบอร์สำรอง<input name="alternatePhone" placeholder="เบอร์โทรสำรอง"></label>
          <label class="span-2">ที่อยู่จัดส่ง<input name="address" placeholder="ที่อยู่จัดส่ง"></label>
          <label>วันที่ซื้อ<input name="date" type="date" required></label>
          <label>จำนวนกระปุก<input name="jars" type="number" min="1" value="1" required></label>
          <label>ยอดซื้อ<input name="amount" type="number" min="0" step="1" required></label>
          <label>ช่องทางการสั่งซื้อ
            <input name="sourceChannel" list="orderChannelOptions" autocomplete="off" placeholder="เลือกหรือพิมพ์ช่องทางการสั่งซื้อ">
            <datalist id="orderChannelOptions">
              <option value="เพจงาดำ น้ำมันสกัดเย็น โซมิน"></option>
              <option value="ไลน์บริษัท"></option>
              <option value="โทรสั่ง"></option>
              <option value="ตัวแทน"></option>
            </datalist>
          </label>
          <label>ลูกค้ามาจาก
            <select name="originSourceChoice">
              <option value="">เลือกแหล่งที่มา</option>
              <option value="Facebook">Facebook</option>
              <option value="LINE">LINE</option>
              <option value="โทรเข้า">โทรเข้า</option>
              <option value="ลูกค้าบอกต่อ">ลูกค้าบอกต่อ</option>
              <option value="อื่นๆ">อื่นๆ</option>
            </select>
          </label>
          <label data-origin-source-other hidden>ระบุแหล่งที่มา<input name="originSourceOther" placeholder="ระบุแหล่งที่มา"></label>
          <label>Facebook / LINE ลูกค้า<input name="socialName" placeholder="เช่น F: สมใจ / LINE: somjai"></label>
          <label>ของแถมที่ลูกค้าได้<input name="freeGift" placeholder="เช่น แถม 1 กระปุก, ค่าส่งฟรี"></label>
          <label>สถานะบัตร VIP
            <select name="vipCardStatus">
              <option>ยังไม่ได้ส่งบัตร</option>
              <option>ส่งบัตรแล้ว</option>
            </select>
          </label>
          <label>อาการลูกค้า<input name="tags" placeholder="คั่นด้วย comma เช่น ปวดเข่า, ซื้อให้แม่"></label>
          <label class="span-2">หมายเหตุ<textarea name="note" placeholder="หมายเหตุเกี่ยวกับออเดอร์"></textarea></label>
        </div>
        <div class="dialog-actions">
          <button class="button ghost" value="cancel" type="button" data-close-order>ยกเลิก</button>
          <button class="button primary" id="orderSubmitButton" type="submit">บันทึกออเดอร์</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteOrderDialog" class="dialog">
      <form id="deleteOrderForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Delete Order</p>
            <h2>ลบออเดอร์นี้?</h2>
          </div>
          <button class="icon-button" type="button" data-close-delete-order aria-label="ปิด">×</button>
        </div>
        <p class="dialog-note">การลบจะมีผลเฉพาะออเดอร์ที่เลือก และจะไม่กระทบข้อมูลลูกค้า</p>
        <div class="dialog-actions">
          <button class="button ghost" type="button" data-close-delete-order>ยกเลิก</button>
          <button class="button danger" type="submit">ลบออเดอร์</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteCustomerDialog" class="dialog">
      <form id="deleteCustomerForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Delete Customer</p>
            <h2>ลบลูกค้ารายนี้?</h2>
          </div>
          <button class="icon-button" type="button" data-close-delete-customer aria-label="ปิด">×</button>
        </div>
        <p class="dialog-note">ลบได้เฉพาะลูกค้าที่ไม่มีออเดอร์เท่านั้น</p>
        <div class="dialog-actions">
          <button class="button ghost" type="button" data-close-delete-customer>ยกเลิก</button>
          <button class="button danger" type="submit">ลบลูกค้า</button>
        </div>
      </form>
    </dialog>

    <dialog id="logoutDialog" class="dialog">
      <form id="logoutForm" method="dialog">
        <div class="dialog-header">
          <h2>ยืนยันออกจากระบบ?</h2>
          <button class="icon-button" type="button" data-close-logout aria-label="ปิด">×</button>
        </div>
        <div class="dialog-actions">
          <button class="button ghost" type="button" data-close-logout>ยกเลิก</button>
          <button class="button danger" type="submit">ออกจากระบบ</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
